<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusionaly</title>
    <script>
        // Apply the saved theme before paint to avoid a flash of the wrong theme.
        (function () {
            try {
                var t = localStorage.getItem('fusionaly-theme');
                if (t === 'dark' || t === 'phosphor') document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="/assets/inertia.css">
</head>
<body>
    <div id="app" data-page='{{.page}}'></div>
    <script type="module" src="/assets/inertia.js"></script>
</body>
</html>
